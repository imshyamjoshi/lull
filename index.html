<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <button class="icon-btn" id="gear" type="button" aria-label="Settings"></button>
      </div>

      <main class="stage">
        <div class="presets" id="presets" aria-label="Cycle presets"></div>

        <div class="readout">
          <div class="phase" id="phase">focus</div>

          <div class="clock">
            <div class="digits" id="digits" role="timer" aria-live="off">25:00</div>
            <div class="editor" id="editor" hidden aria-label="Set focus duration"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="primary" type="button">
            <span class="btn-ico" id="primaryIco"></span><span class="btn-label" id="primaryLabel">Start</span>
          </button>
          <button class="btn" id="reset" type="button">
            <span class="btn-ico" id="resetIco"></span><span class="btn-label">Reset</span>
          </button>
        </div>

        <div class="rest-config" id="restConfig" aria-label="Rest configuration"></div>

        <div class="dots" id="dots" aria-hidden="true"></div>

        <div class="stats" id="stats" aria-live="off"></div>
      </main>
    </div>

    <section class="settings" id="settings" hidden aria-label="Settings">
      <div class="settings__head">
        <span class="settings__title">Settings</span>
        <button class="icon-btn" id="settingsClose" type="button" aria-label="Close settings">&times;</button>
      </div>
      <div class="settings__list" id="settingsList"></div>
      <button class="settings__reset" id="resetDefaults" type="button">Reset to defaults</button>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
